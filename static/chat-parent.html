<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ФРЭД — чат с родителем</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23667EEA'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40' font-weight='bold' font-family='Arial'%3EФ%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #27ae60;
        }
        .logo { font-size: 20px; font-weight: bold; color: #333; }
        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }
        .fred-image {
            flex: 1;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .fred-image img { max-width: 100%; max-height: 100%; border-radius: 20px; }
        .chat-container {
            flex: 2;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 14px;
        }
        .message.fred { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.user { background: #27ae60; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .input-area { padding: 15px; border-top: 1px solid #e0e0e0; }
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .input-row button { background: #27ae60; border: none; padding: 0 20px; border-radius: 25px; color: white; cursor: pointer; }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            background: white;
            border: 2px solid #27ae60;
            padding: 10px 20px;
            border-radius: 30px;
            color: #27ae60;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .action-btn:hover { background: #27ae60; color: white; }
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .fred-image { min-height: 200px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/static/choose-role.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="logo">🧮 ФРЭД</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="main-content">
        <div class="fred-image">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect width='300' height='300' fill='%23F0F4FF' rx='20'/%3E%3Ccircle cx='150' cy='130' r='50' fill='%23667EEA'/%3E%3Ccircle cx='125' cy='120' r='5' fill='white'/%3E%3Ccircle cx='175' cy='120' r='5' fill='white'/%3E%3Cpath d='M120 160 Q150 190 180 160' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Crect x='110' y='200' width='80' height='40' fill='%23764BA2' rx='10'/%3E%3Ctext x='150' y='225' text-anchor='middle' fill='white' font-size='20' font-family='Arial' font-weight='bold'%3EФ%3C/text%3E%3C/svg%3E" alt="Фрэд">
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Напишите ответ...">
                    <button id="sendBtn">📤</button>
                </div>
                <div class="action-buttons" id="actionButtons">
                    <button class="action-btn" id="aboutBtn">📖 О системе</button>
                    <button class="action-btn" id="tariffsBtn">💰 Тарифы</button>
                    <button class="action-btn" id="accessBtn">🔓 Доступ в систему</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let step = 0;
        let isTyping = false;
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        async function typeText(element, text, speed = 30) {
            if (isTyping) return;
            isTyping = true;
            element.innerHTML = '';
            for (let i = 0; i <= text.length; i++) {
                element.innerHTML = text.substring(0, i);
                await new Promise(resolve => setTimeout(resolve, speed));
            }
            isTyping = false;
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'fred'}`;
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        async function startDialog() {
            const responseDiv = addMessage("", false);
            await typeText(responseDiv, "Здравствуйте! Я ФРЭД — ИИ-репетитор по математике.\n\nРасскажите, для кого вы ищете репетитора: для сына или дочери? Какой класс? Есть ли цель по баллам ЕГЭ?");
            step = 1;
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        async function handleUserInput(message) {
            if (!message.trim()) return;
            addMessage(message, true);
            messageInput.value = '';
            
            if (step === 1) {
                const responseDiv = addMessage("", false);
                await typeText(responseDiv, "Спасибо за информацию! Я подготовил для вас индивидуальное предложение. Хотите получить его на почту или посмотреть здесь?");
                step = 2;
            } else if (step === 2) {
                const responseDiv = addMessage("", false);
                await typeText(responseDiv, "Отлично! Наши тарифы и возможности вы можете посмотреть на главной странице. Если остались вопросы — спрашивайте!");
                step = 3;
            }
        }

        sendBtn.onclick = () => {
            const message = messageInput.value.trim();
            if (message && !isTyping) handleUserInput(message);
        };
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };

        document.getElementById('aboutBtn').onclick = () => window.location.href = '/';
        document.getElementById('tariffsBtn').onclick = () => window.location.href = '/#tariffs';
        document.getElementById('accessBtn').onclick = () => window.location.href = '/static/app.html';

        startDialog();
    </script>
</body>
</html>
