<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фрэд — Учитель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header {
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; }
        .user-info { font-size: 14px; opacity: 0.8; }
        .logout-btn {
            background: none;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .logout-btn:hover { background: #e74c3c; color: white; }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .student-card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            flex: 1;
            min-width: 240px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .student-info h4 { color: #2c3e50; margin-bottom: 4px; }
        .student-info .stats { font-size: 13px; color: #666; }
        .student-status { font-size: 20px; }
        .btn-action {
            background: #667EEA;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-action:hover { background: #5a6fd6; }
        .footer {
            background: #2c3e50;
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 8px;
            font-size: 12px;
        }
        .placeholder {
            color: #888;
            font-style: italic;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .student-card { min-width: auto; flex-wrap: wrap; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>👨‍🏫 Фрэд — Учитель</h1>
            <div>
                <span class="user-info" id="userName">👤 Загрузка...</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <div class="main">
            <div class="placeholder">👥 Список учеников появится здесь, когда они зарегистрируются и привяжутся к вам.</div>
        </div>

        <footer class="footer">© 2026 Фрэд — ИИ-репетитор по математике</footer>
    </div>

    <script>
        function getUserId() {
            const id = localStorage.getItem('fred_user_id');
            if (!id) window.location.href = '/static/auth.html';
            return id;
        }

        function getUserName() {
            return localStorage.getItem('fred_user_name') || 'Учитель';
        }

        function logout() {
            localStorage.removeItem('fred_user_id');
            localStorage.removeItem('fred_user_role');
            localStorage.removeItem('fred_user_name');
            window.location.href = '/static/auth.html';
        }

        document.getElementById('userName').textContent = `👤 ${getUserName()}`;
    </script>
</body>
</html>
