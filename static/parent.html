<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фрэд — Родитель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            background: none;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .logout-btn:hover {
            background: #e74c3c;
            color: white;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .child-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .child-card h3 {
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .child-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-item .value {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-item .label {
            font-size: 11px;
            color: #888;
        }
        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #27ae60;
            height: 100%;
            border-radius: 10px;
        }
        .link-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-top: 16px;
        }
        .link-section h3 {
            margin-bottom: 12px;
        }
        .link-input {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .link-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            min-width: 200px;
        }
        .btn-primary {
            background: #667EEA;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .empty-state {
            color: #888;
            text-align: center;
            padding: 20px;
        }
        .footer {
            background: #2c3e50;
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 8px;
            font-size: 12px;
            flex-shrink: 0;
        }
        @media (max-width: 768px) {
            .child-stats {
                grid-template-columns: 1fr 1fr;
            }
            .link-input {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>👨‍👩‍👧 Фрэд — Родитель</h1>
            <div class="header-right">
                <span id="userName">👤 Загрузка...</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <div class="main" id="dashboard">
            <div id="childrenContainer">
                <div class="empty-state">⏳ Загрузка данных...</div>
            </div>

            <div class="link-section">
                <h3>🔗 Привязать ученика</h3>
<div class="link-input">
        <input type="text" id="studentEmailInput" placeholder="Email ученика">
        <button class="btn-primary" onclick="findStudentByEmail()">🔍 Найти</button>
    </div>
    <div id="studentSearchResult" style="margin-top:8px;font-size:13px;"></div>
                <p style="font-size:13px;color:#666;margin-bottom:12px;">Введите ID ученика, чтобы отправить запрос на привязку.</p>
                <div class="link-input">
                    <input type="text" id="studentIdInput" placeholder="ID ученика (например, user_abc123)">
                    <button class="btn-primary" onclick="linkStudent()">📤 Отправить запрос</button>
                </div>
                <div id="linkMessage" style="margin-top:8px;font-size:13px;"></div>
            </div>
        </div>

        <footer class="footer">© 2026 Фрэд — ИИ-репетитор по математике</footer>
    </div>

    <script>
        var userId = null;

        function getUserId() {
            var id = localStorage.getItem('fred_user_id');
            if (!id) window.location.href = '/static/auth.html';
            return id;
        }

        function getUserName() {
            return localStorage.getItem('fred_user_name') || 'Родитель';
        }

        function logout() {
            localStorage.removeItem('fred_user_id');
            localStorage.removeItem('fred_user_role');
            localStorage.removeItem('fred_user_name');
            window.location.href = '/static/auth.html';
        }

        async function loadChildren() {
            userId = getUserId();
            var container = document.getElementById('childrenContainer');

            try {
                var response = await fetch('/api/family/children?parent_id=' + userId);
                var data = await response.json();

                if (!data.children || data.children.length === 0) {
                    container.innerHTML = '<div class="empty-state">👶 У вас пока нет привязанных учеников.<br>Попросите ученика сообщить свой ID и привяжите его ниже.</div>';
                    return;
                }

                var html = '';
                for (var i = 0; i < data.children.length; i++) {
                    var child = data.children[i];
                    // Загружаем реальную статистику
                    var statsResponse = await fetch('/api/student/stats/' + child.student_id);
                    var stats = await statsResponse.json();

                    html += `
                        <div class="child-card">
                            <h3>👧 ${child.name}</h3>
                            <div class="child-stats">
                                <div class="stat-item">
                                    <div class="value">${stats.score || 0}</div>
                                    <div class="label">Баллы</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value">${stats.progress || 0}%</div>
                                    <div class="label">Успеваемость</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value">${stats.tasks_done || 0}</div>
                                    <div class="label">Заданий</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value">${stats.topics_completed || 0}</div>
                                    <div class="label">Темы</div>
                                </div>
                            </div>
                            <div style="margin: 8px 0;"><strong>Прогресс:</strong></div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${stats.progress || 0}%"></div>
                            </div>
                            <div style="margin-top: 8px; font-size: 13px; color: #666;">
                                📈 +${stats.weekly_gain || 0} баллов за неделю
                            </div>
                            <button onclick="unlinkChild('${child.student_id}')" class="btn-danger">✖ Отвязать</button>
                        </div>
                    `;
                }
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = '<div class="empty-state">❌ Ошибка загрузки данных</div>';
                console.error('Ошибка:', error);
            }
        }

        async function linkStudent() {
            var studentId = document.getElementById('studentIdInput').value.trim();
            var messageDiv = document.getElementById('linkMessage');

            if (!studentId) {
                messageDiv.innerHTML = '⚠️ Введите ID ученика';
                messageDiv.style.color = '#e74c3c';
                return;
            }

            try {
                var response = await fetch('/api/family/link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        parent_id: userId,
                        student_id: studentId
                    })
                });
                var data = await response.json();

                if (response.ok) {
                    messageDiv.innerHTML = '✅ Запрос отправлен! Ожидайте подтверждения от ученика.';
                    messageDiv.style.color = '#27ae60';
                    document.getElementById('studentIdInput').value = '';
                    setTimeout(loadChildren, 1500);
                } else {
                    messageDiv.innerHTML = '❌ ' + (data.detail || 'Ошибка');
                    messageDiv.style.color = '#e74c3c';
                }
            } catch (error) {
                messageDiv.innerHTML = '❌ Ошибка сервера';
                messageDiv.style.color = '#e74c3c';
            }
        }

        async function unlinkChild(studentId) {
            if (!confirm('Вы уверены, что хотите отвязать этого ученика?')) return;
            if (!confirm('Это действие нельзя отменить. Вы точно хотите отвязать ученика?')) return;

            try {
                var response = await fetch('/api/family/unlink', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        parent_id: userId,
                        student_id: studentId
                    })
                });
                var data = await response.json();
                if (response.ok) {
                    alert('✅ Ученик отвязан');
                    loadChildren();
                } else {
                    alert('❌ ' + (data.detail || 'Ошибка'));
                }
            } catch (error) {
                alert('❌ Ошибка сервера');
            }
        }

        userId = getUserId();
        document.getElementById('userName').textContent = '👤 ' + getUserName();
        loadChildren();

async function findStudentByEmail() {
    const email = document.getElementById('studentEmailInput').value.trim();
    const resultDiv = document.getElementById('studentSearchResult');
    
    if (!email) {
        resultDiv.innerHTML = '⚠️ Введите email ученика';
        resultDiv.style.color = '#e74c3c';
        return;
    }
    
    try {
        const response = await fetch(`/api/user/find-by-email?email=${email}`);
        const data = await response.json();
        if (response.ok) {
            resultDiv.innerHTML = `✅ Найден: ${data.first_name} (ID: ${data.user_id})`;
            resultDiv.style.color = '#27ae60';
            document.getElementById('studentIdInput').value = data.user_id;
        } else {
            resultDiv.innerHTML = '❌ Пользователь не найден';
            resultDiv.style.color = '#e74c3c';
        }
    } catch (error) {
        resultDiv.innerHTML = '❌ Ошибка поиска';
        resultDiv.style.color = '#e74c3c';
    }
}


    </script>
</body>
</html>
